<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ForecastHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home">
    <div class="sky-effects">
        <div class="cloud cloud1"></div>
        <div class="cloud cloud2"></div>
        <div class="rain-layer"></div>
        <div class="fog-layer"></div>
        <div class="sun-orb"></div>
        <div class="bush bush-left"></div>
        <div class="bush bush-right"></div>
    </div>

    <main class="app">
        <section class="hero">
            <p class="label">REAL-TIME WEATHER EXPERIENCE</p>
            <h1>ForecastHub - Jenkins Test</h1>
            <p class="subtitle">Discover live weather using GPS location or city search</p>

            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button onclick="getWeatherByCity()">Search Weather</button>
                <button class="gps-btn" onclick="getWeather()">Use My Location</button>
            </div>
        </section>

        <section class="dashboard">
            <div class="weather-main" id="mainWeather">
                <p class="label">TODAY</p>
                <h2>Ready to explore weather</h2>
                <p>Search a city or use GPS to view real-time weather details.</p>
            </div>

            <div class="weather-details" id="result"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
