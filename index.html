<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ForecastHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-animation"></div>

    <main class="app">
        <section class="left-panel">
            <p class="label">LIVE WEATHER DASHBOARD</p>
            <h1>ForecastHub</h1>
            <p class="subtitle">Real-time GPS based weather intelligence</p>

            <div class="search-area">
                <input type="text" id="cityInput" placeholder="Search city">
                <button onclick="getWeatherByCity()">Search</button>
                <button class="gps" onclick="getWeather()">Use My Location</button>
            </div>
        </section>

        <section class="right-panel">
            <div class="weather-main" id="mainWeather">
                <p class="label">TODAY</p>
                <h2>Ready to detect weather</h2>
                <p>Use GPS or search city to view live weather.</p>
            </div>

            <div class="weather-details" id="result"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
