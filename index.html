<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ForecastHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-bg"></div>

    <div class="dashboard">
        <div class="sidebar">
            <h2>ForecastHub</h2>
            <p>Real-time Weather</p>
            <button onclick="getWeather()">📍 Use My Location</button>
            <input type="text" id="cityInput" placeholder="Search city">
            <button onclick="getWeatherByCity()">Search</button>
        </div>

        <div class="main-content">
            <div class="top-card" id="mainWeather">
                <h1>Today's Weather</h1>
                <p>Click location or search city</p>
            </div>

            <div class="details-grid" id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
