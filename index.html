<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ForecastHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="animation-layer"></div>

    <div class="app">
        <section class="hero">
            <h1>ForecastHub</h1>
            <p>Real-time location based weather dashboard</p>

            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Search city...">
                <button onclick="getWeatherByCity()">Search</button>
                <button onclick="getWeather()">Use My Location</button>
            </div>
        </section>

        <section class="weather-panel">
            <div class="main-weather" id="mainWeather">
                <p class="small-title">TODAY'S WEATHER</p>
                <h2>Discover your weather</h2>
                <p>Search a city or use GPS location</p>
            </div>

            <div class="weather-grid" id="result"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
