<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ForecastHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-animation"></div>

    <main class="container">
        <section class="hero-card">
            <div>
                <p class="tag">LIVE WEATHER DASHBOARD</p>
                <h1>ForecastHub</h1>
                <p class="subtitle">Real-time weather using your location or city search</p>
            </div>

            <div class="search-row">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button onclick="getWeatherByCity()">Search</button>
                <button class="location-btn" onclick="getWeather()">Use My Location</button>
            </div>
        </section>

        <section class="dashboard">
            <div class="main-weather" id="mainWeather">
                <p class="tag">TODAY</p>
                <h2>Check live weather</h2>
                <p>Search a city or use GPS location.</p>
            </div>

            <div class="details-grid" id="result"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
