<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ForecastHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-card">
        <h1>ForecastHub</h1>
        <p>Real-Time Weather Dashboard</p>

        <input type="text" id="cityInput" placeholder="Enter city name">
        <button onclick="getWeatherByCity()">Search City</button>
        <button onclick="getWeather()">Use My Location</button>

        <div id="result">
            <p>Search a city or use location.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
